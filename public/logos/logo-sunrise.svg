<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 185" role="img" aria-label="Karwar Eye Hospital - Sunrise Logo">
  <defs>
    <clipPath id="keh-sr-clip">
      <circle cx="160" cy="75" r="40"/>
    </clipPath>
    <linearGradient id="keh-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d8878"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- Sclera -->
  <path d="M 50 75 Q 160 15 270 75 Q 160 135 50 75 Z" fill="#f0fdfa"/>

  <!-- Iris: sky gradient -->
  <circle cx="160" cy="75" r="40" fill="url(#keh-sky)"/>

  <!-- Sunrise scene clipped to iris -->
  <g clip-path="url(#keh-sr-clip)">

    <!-- Sea (dark lower half) -->
    <rect x="120" y="78" width="80" height="37" fill="#084c47"/>

    <!-- Horizon line -->
    <line x1="120" y1="78" x2="200" y2="78" stroke="white" stroke-width="0.8" opacity="0.5"/>

    <!-- Sun warm glow (large soft halo behind sun) -->
    <circle cx="160" cy="68" r="20" fill="#fff3a0" opacity="0.18"/>
    <circle cx="160" cy="68" r="15" fill="#fff9c4" opacity="0.25"/>

    <!-- Sun disc -->
    <circle cx="160" cy="68" r="11" fill="#fff9c4"/>

    <!-- Sun rays (from top of sun: 160,57 going upward) -->
    <line x1="160" y1="57" x2="160" y2="43"   stroke="#fff9c4" stroke-width="2"   opacity="0.9"/>
    <line x1="160" y1="57" x2="151" y2="47"   stroke="#fff9c4" stroke-width="1.5" opacity="0.8"/>
    <line x1="160" y1="57" x2="169" y2="47"   stroke="#fff9c4" stroke-width="1.5" opacity="0.8"/>
    <line x1="160" y1="57" x2="144" y2="53"   stroke="#fff9c4" stroke-width="1.5" opacity="0.65"/>
    <line x1="160" y1="57" x2="176" y2="53"   stroke="#fff9c4" stroke-width="1.5" opacity="0.65"/>
    <!-- Side rays just above horizon -->
    <line x1="149" y1="68" x2="136" y2="65"   stroke="#fff9c4" stroke-width="1.5" opacity="0.5"/>
    <line x1="171" y1="68" x2="184" y2="65"   stroke="#fff9c4" stroke-width="1.5" opacity="0.5"/>

    <!-- Sun reflection on sea -->
    <line x1="153" y1="82" x2="167" y2="82" stroke="#fff9c4" stroke-width="2"   opacity="0.55"/>
    <line x1="148" y1="87" x2="172" y2="87" stroke="#fff9c4" stroke-width="1.2" opacity="0.3"/>
    <line x1="144" y1="92" x2="176" y2="92" stroke="#fff9c4" stroke-width="0.8" opacity="0.2"/>

    <!-- Tiny fishing boat silhouette on horizon -->
    <path d="M 132 77.5 Q 138 74.5 144 77.5" stroke="white" stroke-width="1" fill="none" opacity="0.5"/>
    <line x1="138" y1="74.5" x2="138" y2="70" stroke="white" stroke-width="0.8" opacity="0.5"/>
  </g>



  <!-- Thin rule -->
  <line x1="88" y1="147" x2="232" y2="147" stroke="#0f766e" stroke-width="0.7" opacity="0.3"/>

  <!-- Hospital name -->
  <text x="160" y="160"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13.5" font-weight="bold"
    fill="#0f766e" letter-spacing="2.5">KARWAR EYE HOSPITAL</text>

  <!-- Tagline -->
  <text x="160" y="175"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="8.5"
    fill="#5eaaa5" letter-spacing="3.5">A NEW DAWN FOR YOUR VISION</text>
</svg>
